<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Async Weather Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <canvas id="weatherCanvas"></canvas>
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>
  <div id="lightningOverlay"></div>

  <div class="page">

    <header class="header">
      <div class="header-logo">
        <div class="header-icon-pill" id="headerIconPill">⛅</div>
        <h1 class="header-title">Async Weather Tracker</h1>
      </div>
    </header>

    <main class="main-grid">

      <!-- LEFT: Search Panel -->
      <section class="panel panel-left">
        <p class="panel-label">Search City, Town or Locality</p>
        <div class="search-wrap-outer">
          <div class="search-row">
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
              </span>
              <input type="text" id="cityInput" class="search-input"
                placeholder="e.g. Almora, Lajpat Nagar, Sohna..."
                autocomplete="off" spellcheck="false"/>
              <button class="input-clear-btn" id="inputClearBtn" title="Clear">&#x2715;</button>
            </div>
            <button class="search-btn" id="searchBtn">
              <span class="btn-text">Search</span>
              <span class="btn-spinner" id="btnSpinner"></span>
            </button>
          </div>
          <div class="autocomplete-drop" id="autocompleteDrop"></div>
        </div>

        <div class="inline-msg" id="inlineMsg"></div>

        <div class="search-tips">
          <span class="tip-label">Try:</span>
          <button class="tip-chip" data-q="Almora, Uttrakhand">Almora</button>
          <button class="tip-chip" data-q="Lajpat Nagar, Delhi">Lajpat Nagar</button>
          <button class="tip-chip" data-q="Sohna, Haryana">Sohna</button>
          <button class="tip-chip" data-q="Shimla, Himachal Pradesh">Shimla</button>
        </div>

        <p class="panel-label" style="margin-top:22px;">Search History</p>
        <div class="history-wrap" id="historyWrap">
          <span class="no-history" id="noHistory">No history yet</span>
        </div>
        <button class="clear-hist-btn" id="clearHistBtn">&#x2715; Clear history</button>
      </section>

      <!-- RIGHT: Weather Panel -->
      <section class="panel panel-right" id="panelRight">
        <p class="panel-label">Weather Info</p>

        <div class="weather-banner" id="weatherBanner">
          <div class="w-icon-large" id="wIconLarge">&#x1F324;&#xFE0F;</div>
          <div class="banner-info">
            <div class="banner-temp" id="bannerTemp">&mdash;</div>
            <div class="banner-condition" id="bannerCondition">&mdash;</div>
            <div class="banner-location" id="bannerLocation">&mdash;</div>
          </div>
        </div>

        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#x1F30D;</div>
          <p>Search a city to see weather</p>
        </div>

        <div class="skeleton-rows" id="skeletonRows">
          <div class="sk-row"><div class="sk-bar" style="width:30%"></div><div class="sk-bar" style="width:40%"></div></div>
          <div class="sk-row"><div class="sk-bar" style="width:24%"></div><div class="sk-bar" style="width:52%"></div></div>
          <div class="sk-row"><div class="sk-bar" style="width:18%"></div><div class="sk-bar" style="width:28%"></div></div>
          <div class="sk-row"><div class="sk-bar" style="width:28%"></div><div class="sk-bar" style="width:44%"></div></div>
          <div class="sk-row"><div class="sk-bar" style="width:22%"></div><div class="sk-bar" style="width:36%"></div></div>
        </div>

        <div class="weather-error" id="weatherErr"></div>

        <div class="weather-rows" id="weatherRows">
          <div class="w-row">
            <span class="w-key"><span class="w-key-icon">&#x1F4CD;</span>Location</span>
            <div class="w-val-group">
              <span class="w-val" id="wCity">&mdash;</span>
              <span class="loc-badge" id="locBadge"></span>
            </div>
          </div>
          <div class="w-row">
            <span class="w-key"><span class="w-key-icon">&#x1F321;&#xFE0F;</span>Temperature</span>
            <span class="w-val" id="wTemp" style="color:var(--lime)">&mdash;</span>
          </div>
          <div class="w-row">
            <span class="w-key"><span class="w-key-icon">&#x1F324;&#xFE0F;</span>Condition</span>
            <span class="w-val" id="wWeather">&mdash;</span>
          </div>
          <div class="w-row">
            <span class="w-key"><span class="w-key-icon">&#x1F4A7;</span>Humidity</span>
            <div class="humidity-bar-wrap">
              <span class="w-val" id="wHumidity">&mdash;</span>
              <div class="humidity-bar"><div class="humidity-fill" id="humidityFill"></div></div>
            </div>
          </div>
          <div class="w-row">
            <span class="w-key"><span class="w-key-icon">&#x1F4A8;</span>Wind</span>
            <span class="w-val" id="wWind">&mdash;</span>
          </div>
          <div class="w-row">
            <span class="w-key"><span class="w-key-icon">&#x1F321;&#xFE0F;</span>Feels Like</span>
            <span class="w-val" id="wFeels">&mdash;</span>
          </div>
          <div class="w-row">
            <span class="w-key"><span class="w-key-icon">&#x1F441;&#xFE0F;</span>Visibility</span>
            <span class="w-val" id="wVis">&mdash;</span>
          </div>
        </div>
      </section>

    </main>

    <!-- Console Panel -->
    <section class="console-section">
      <div class="console-topbar">
        <div class="c-dots">
          <span class="cdot r"></span>
          <span class="cdot y"></span>
          <span class="cdot g"></span>
        </div>
        <span class="console-title">Console &ndash; Event Loop</span>
        <button class="c-clear-btn" id="clearConsoleBtn">Clear</button>
      </div>
      <div class="console-body" id="consoleBody"></div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
